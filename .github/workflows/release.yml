name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package, notarize, and release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Validate tag
        id: version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must use vMAJOR.MINOR.PATCH format: $RELEASE_TAG" >&2
            exit 1
          fi
          echo "number=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/strongcopy-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          printf '%s' "$MACOS_CERTIFICATE" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Package signed DMG
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          CODESIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: scripts/package-macos.sh "${{ steps.version.outputs.number }}" artifacts

      - name: Verify signed package
        run: |
          scripts/verify-macos-package.sh \
            "artifacts/Strongcopy-${{ steps.version.outputs.number }}.dmg" \
            "${{ steps.version.outputs.number }}" \
            "${{ github.run_number }}"

      - name: Notarize and staple DMG
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" | base64 -D > "$API_KEY_PATH"
          xcrun notarytool submit \
            "artifacts/Strongcopy-${{ steps.version.outputs.number }}.dmg" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "artifacts/Strongcopy-${{ steps.version.outputs.number }}.dmg"
          (
            cd artifacts
            shasum -a 256 "Strongcopy-${{ steps.version.outputs.number }}.dmg" \
              > "Strongcopy-${{ steps.version.outputs.number }}.dmg.sha256"
          )

      - name: Verify notarized package
        env:
          REQUIRE_NOTARIZATION: "1"
        run: |
          scripts/verify-macos-package.sh \
            "artifacts/Strongcopy-${{ steps.version.outputs.number }}.dmg" \
            "${{ steps.version.outputs.number }}" \
            "${{ github.run_number }}"
          spctl --assess \
            --type open \
            --context context:primary-signature \
            --verbose=2 \
            "artifacts/Strongcopy-${{ steps.version.outputs.number }}.dmg"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.number }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "artifacts/Strongcopy-$VERSION.dmg" \
              "artifacts/Strongcopy-$VERSION.dmg.sha256" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "artifacts/Strongcopy-$VERSION.dmg" \
              "artifacts/Strongcopy-$VERSION.dmg.sha256" \
              --verify-tag \
              --generate-notes \
              --title "Strongcopy $VERSION"
          fi

      - name: Clean up signing material
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/strongcopy-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/certificate.p12" "$RUNNER_TEMP"/AuthKey_*.p8
