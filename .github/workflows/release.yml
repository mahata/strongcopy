name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  release:
    name: Package and release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Reserve patch version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          while true; do
            git fetch --force --tags origin

            EXISTING_TAG="$(
              git tag --points-at "$RELEASE_SHA" --sort=-version:refname |
                awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ && !found { print; found=1 }'
            )"

            if [[ -n "$EXISTING_TAG" ]]; then
              if RELEASE_DETAILS="$(
                gh release view "$EXISTING_TAG" --json isDraft,assets 2>/dev/null
              )"; then
                VERSION="${EXISTING_TAG#v}"
                if jq -e \
                  --arg dmg "Strongcopy-$VERSION.dmg" \
                  --arg checksum "Strongcopy-$VERSION.dmg.sha256" \
                  '.isDraft == false
                    and ([.assets[].name] | index($dmg)) != null
                    and ([.assets[].name] | index($checksum)) != null' \
                  <<< "$RELEASE_DETAILS" >/dev/null; then
                  echo "Commit $RELEASE_SHA was already released as $EXISTING_TAG."
                  echo "should_release=false" >> "$GITHUB_OUTPUT"
                  exit 0
                fi

                echo "Release $EXISTING_TAG is incomplete or still a draft; rebuilding it."
              fi

              RELEASE_TAG="$EXISTING_TAG"
              break
            fi

            LATEST_TAG="$(
              git tag --list 'v*' --sort=-version:refname |
                awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ && !found { print; found=1 }'
            )"

            if [[ -z "$LATEST_TAG" ]]; then
              RELEASE_TAG="v0.1.0"
            else
              IFS=. read -r MAJOR MINOR PATCH <<< "${LATEST_TAG#v}"
              RELEASE_TAG="v$MAJOR.$MINOR.$((PATCH + 1))"
            fi

            git tag "$RELEASE_TAG" "$RELEASE_SHA"
            if git push origin "refs/tags/$RELEASE_TAG"; then
              break
            fi

            git tag -d "$RELEASE_TAG"
            if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null; then
              echo "Version $RELEASE_TAG was reserved concurrently; retrying."
              sleep 2
              continue
            fi

            echo "Failed to reserve $RELEASE_TAG and no matching remote tag exists." >&2
            exit 1
          done

          echo "Reserved $RELEASE_TAG for $RELEASE_SHA."
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "number=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Package DMG with ad-hoc-signed app
        if: steps.version.outputs.should_release == 'true'
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: scripts/package-macos.sh "${{ steps.version.outputs.number }}" artifacts

      - name: Verify package
        if: steps.version.outputs.should_release == 'true'
        run: |
          scripts/verify-macos-package.sh \
            "artifacts/Strongcopy-${{ steps.version.outputs.number }}.dmg" \
            "${{ steps.version.outputs.number }}" \
            "${{ github.run_number }}"

      - name: Publish GitHub Release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.number }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" \
              "artifacts/Strongcopy-$VERSION.dmg" \
              "artifacts/Strongcopy-$VERSION.dmg.sha256" \
              --clobber
            gh release edit "$RELEASE_TAG" --draft=false
          else
            gh release create "$RELEASE_TAG" \
              "artifacts/Strongcopy-$VERSION.dmg" \
              "artifacts/Strongcopy-$VERSION.dmg.sha256" \
              --verify-tag \
              --generate-notes \
              --title "Strongcopy $VERSION"
          fi
